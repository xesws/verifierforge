<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 112" role="img" aria-labelledby="vf-wordmark-title vf-wordmark-desc">
<title id="vf-wordmark-title">VerifierForge</title>
<desc id="vf-wordmark-desc">VerifierForge wordmark using the product VF gradient tile.</desc>
<defs>
<linearGradient id="vf-product-gradient" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#1488f4"/>
<stop offset="0.55" stop-color="#0872dd"/>
<stop offset="1" stop-color="#00a67e"/>
</linearGradient>
</defs>
<g transform="translate(4 8)"><rect width="96" height="96" rx="32" fill="url(#vf-product-gradient)"/>
<text x="18" y="39" fill="#fff" font-family="Manrope,Inter,Arial,sans-serif" font-size="30" font-weight="700">V</text>
<text x="59" y="80" fill="#fff" font-family="Manrope,Inter,Arial,sans-serif" font-size="30" font-weight="700">F</text>
<path d="M17 73 79 18" fill="none" stroke="#fff" stroke-opacity=".5" stroke-width="3" stroke-linecap="round"/></g>
<text x="124" y="74" font-family="Manrope,Inter,Arial,sans-serif" font-size="54" font-weight="750" letter-spacing="-2.5" fill="#17212b">Verifier</text>
<text x="327" y="74" font-family="Manrope,Inter,Arial,sans-serif" font-size="54" font-weight="750" letter-spacing="-2.5" fill="#087cf0">Forge</text>
</svg>
