name: security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-and-database-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-app.txt
            requirements-dev.txt
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m scripts.scan_secrets
      - run: pytest -q tests/test_database_settings.py tests/test_database_credentials.py tests/test_database_failures.py tests/test_p4_api.py tests/test_p4_product.py tests/test_secret_scan.py
