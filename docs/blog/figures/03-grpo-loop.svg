<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
<title id="title">Verifier-backed GRPO training loop</title>
<desc id="desc">A prompt produces eight rollouts, the verifier scores them, group-relative advantages are computed, and a KL-constrained policy update follows.</desc>
<metadata>{&quot;facts&quot;:{&quot;kl_loss_coef&quot;:0.001,&quot;lora_rank&quot;:16,&quot;rollout_n&quot;:8,&quot;steps&quot;:400},&quot;sources&quot;:[{&quot;path&quot;:&quot;trainer/verl_configs/grpo_v1_1p5b_h100_main.yaml&quot;,&quot;sha256&quot;:&quot;6164b98a76d5c15f481923395668170c53198c6e05b7c6ad30c07ba0b750b48e&quot;}]}</metadata>
<defs>
<filter id="shadow" x="-15%" y="-15%" width="130%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#304d5b" flood-opacity=".10"/></filter>
<linearGradient id="accent" x1="0" x2="1"><stop stop-color="#087cf0"/><stop offset="1" stop-color="#00a67e"/></linearGradient>
<style>text{font-family:Manrope,Inter,Arial,sans-serif;fill:#17212b}.mono{font-family:"IBM Plex Mono",Menlo,monospace}.label{font-size:13px;letter-spacing:.09em;text-transform:uppercase;font-weight:700}.small{font-size:13px}.tiny{font-size:11px}.body{font-size:16px}.heading{font-size:26px;font-weight:750;letter-spacing:-.03em}.hero{font-size:34px;font-weight:780;letter-spacing:-.04em}.muted{fill:#62717d}.soft{fill:#82909a}.blue{fill:#087cf0}.green{fill:#00a67e}.amber{fill:#a96900}.coral{fill:#dd6b5b}.white{fill:#fff}.stroke{stroke:#d6e2e6;stroke-width:1.5}.arrow{stroke:#82909a;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#82909a"/></marker>
</defs>
<rect width="1200" height="680" rx="28" fill="#edf5f7"/>
<text x="48" y="48" class="label blue" text-anchor="start">FIGURE 3 · GRPO</text>
<text x="48" y="84" class="heading" text-anchor="start">Eight attempts become one relative learning signal</text>
<text x="48" y="111" class="small muted" text-anchor="start">Verifier scores replace a learned critic; the group supplies its own baseline.</text>
<circle cx="130" cy="286" r="82" fill="#ffffff" stroke="#087cf0" stroke-width="3" filter="url(#shadow)"/>
<text x="130" y="274" class="label" text-anchor="middle" fill="#087cf0">PROMPT</text>
<text x="130" y="306" class="tiny muted" text-anchor="middle"><tspan x="130" dy="0">Frozen NL→SQL row</tspan></text>
<path d="M214 286 L266 286" stroke="#82909a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<circle cx="350" cy="286" r="82" fill="#ffffff" stroke="#087cf0" stroke-width="3" filter="url(#shadow)"/>
<text x="350" y="274" class="label" text-anchor="middle" fill="#087cf0">k = 8</text>
<text x="350" y="306" class="tiny muted" text-anchor="middle"><tspan x="350" dy="0">vLLM rollouts</tspan><tspan x="350" dy="17">temperature 1.0</tspan></text>
<path d="M434 286 L501 286" stroke="#82909a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<circle cx="585" cy="286" r="82" fill="#ffffff" stroke="#00a67e" stroke-width="3" filter="url(#shadow)"/>
<text x="585" y="274" class="label" text-anchor="middle" fill="#00a67e">VERIFIER</text>
<text x="585" y="306" class="tiny muted" text-anchor="middle"><tspan x="585" dy="0">0.2 / 0.5 / 1.0</tspan><tspan x="585" dy="17">per completion</tspan></text>
<path d="M669 286 L736 286" stroke="#82909a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<circle cx="820" cy="286" r="82" fill="#ffffff" stroke="#a96900" stroke-width="3" filter="url(#shadow)"/>
<text x="820" y="274" class="label" text-anchor="middle" fill="#a96900">RELATIVE A</text>
<text x="820" y="306" class="tiny muted" text-anchor="middle"><tspan x="820" dy="0">subtract group mean</tspan><tspan x="820" dy="17">normalize by spread</tspan></text>
<path d="M904 286 L976 286" stroke="#82909a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<circle cx="1060" cy="286" r="82" fill="#ffffff" stroke="#17212b" stroke-width="3" filter="url(#shadow)"/>
<text x="1060" y="274" class="label" text-anchor="middle" fill="#17212b">UPDATE</text>
<text x="1060" y="306" class="tiny muted" text-anchor="middle"><tspan x="1060" dy="0">clipped objective</tspan><tspan x="1060" dy="17">+ KL to reference</tspan></text>
<path d="M1060 374 L1060 472" stroke="#087cf0" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<path d="M1060 472 L130 472" stroke="#087cf0" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<path d="M130 472 L130 374" stroke="#087cf0" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<text x="595" y="496" class="small mono blue" text-anchor="middle">repeat for 400 steps · checkpoint every 50 · entropy brake armed</text>
<rect x="145" y="535" width="910" height="78" rx="18" fill="#17212b"/>
<text x="600" y="565" class="body mono white" text-anchor="middle">Aᵢ = (rᵢ − mean(r₁…r₈)) / (std(r₁…r₈) + ε)</text>
<text x="600" y="591" class="small mono" text-anchor="middle" fill="#9ddbc9">maximize clipped policy gain − β · KL(πθ || πref)</text>
</svg>
