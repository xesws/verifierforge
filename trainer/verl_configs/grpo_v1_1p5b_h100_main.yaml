# D4 M3: frozen-pool main training on the admitted single H100 path.
model_path: Qwen/Qwen2.5-1.5B-Instruct
total_steps: 400
# Explicitly above the observed ceil(400 / 12) = 34 H100 requirement.
total_epochs: 40
train_batch_size: 4
rollout_n: 8
max_prompt_length: 1024
max_response_length: 512
lora_rank: 16
lora_alpha: 32
learning_rate: 1.0e-6
kl_loss_coef: 0.001
rollout_gpu_memory_utilization: 0.45
enforce_eager: false
vllm_attention_backend: null
checkpoint_every: 50
validation_every: 50
dataset_mode: frozen_training_pool
reward_mode: verifier
save_hf_model: true
entropy_brake: true
